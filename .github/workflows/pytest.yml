name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      # uc_core is not yet on PyPI; install it from GitHub first so that
      # uc80's `pip install -e .` can satisfy the uc_core>=0.1.0 dep.
      # Remove the explicit install once uc_core is published to PyPI.
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install "uc_core @ git+https://github.com/avwohl/uc_core@main"
        pip install -e .
    - name: Run tests
      run: pytest tests/ -v --tb=short
